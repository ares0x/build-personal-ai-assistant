name: Deploy VitePress site to Pages

on:
    push:
        branches: [main]
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: pages
    cancel-in-progress: false

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            # 使用 package.json 中声明的 packageManager 版本（推荐）
            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              # 注意：这里不再写 version，让它自动读取 package.json 的 packageManager 字段

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 22 # 使用目前更稳妥的 LTS
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install

            - name: Build with VitePress
              run: pnpm docs:build

            - name: Upload artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: docs/.vitepress/dist

    deploy:
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        needs: build
        runs-on: ubuntu-latest
        name: Deploy
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
