name: Deploy VitePress site to Pages

on:
    # 当推送到 main 分支时自动触发
    push:
        branches: [main]
    # 允许在 Actions 页面手动触发
    workflow_dispatch:

# 设置权限
permissions:
    contents: read
    pages: write
    id-token: write

# 同一时间只允许一个部署任务
concurrency:
    group: pages
    cancel-in-progress: false

jobs:
    # 构建任务
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0 # 如果需要 git 信息（最后更新时间）

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 9

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install

            - name: Build with VitePress
              run: pnpm docs:build

            - name: Upload artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: docs/.vitepress/dist

    # 部署任务
    deploy:
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        needs: build
        runs-on: ubuntu-latest
        name: Deploy
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
